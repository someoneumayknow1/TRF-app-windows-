name: Build

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet publish TRF.NativeClient/TRF.NativeClient.csproj -c Release -r win-x64 --self-contained true -o ./dist
      - name: Zip output
        run: Compress-Archive -Path ./dist/* -DestinationPath ./TRF.NativeClient.zip
        shell: pwsh
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./TRF.NativeClient.zip
